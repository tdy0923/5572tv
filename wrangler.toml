name = "5572tv-proxy"
main = "proxy.worker.js"
compatibility_date = "2026-01-01"

[site]
bucket = "./public"

[env.production]
routes = [
  { pattern = "www.5572.net/api/proxy/segment*", zone_name = "5572.net" },
  { pattern = "www.5572.net/api/proxy/key*", zone_name = "5572.net" },
  { pattern = "www.5572.net/api/proxy/stream*", zone_name = "5572.net" },
]
