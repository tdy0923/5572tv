name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Run Health Check
        run: bash scripts/health-check.sh https://www.5572.net

      - name: Notify on Failure
        if: failure()
        run: |
          echo "## Health Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "Some health checks failed. Check the run logs for details." >> $GITHUB_STEP_SUMMARY
