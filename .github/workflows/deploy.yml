name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lunatv
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /root/lunatv
            
            # Pull new image
            docker pull ghcr.io/${{ github.repository_owner }}/lunatv:latest
            
            # Stop and remove old container
            docker stop moontv-core || true
            docker rm moontv-core || true
            
            # Run new container
            docker run -d \
              --name moontv-core \
              --network moontv-network \
              -p 3000:3000 \
              -e USERNAME=Danny \
              -e PASSWORD=Danny0923 \
              -e SITE_BASE=https://www.5572.net \
              -e NEXT_PUBLIC_SITE_NAME=5572影视 \
              -e NEXT_PUBLIC_STORAGE_TYPE=kvrocks \
              -e KVROCKS_URL=redis://moontv-kvrocks:6666 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/lunatv:latest
            
            # Cleanup
            docker image prune -f
            docker builder prune -f
