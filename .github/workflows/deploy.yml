name: Deploy To Server

on:
  workflow_run:
    workflows: ["Build & Push Docker image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker pull ghcr.io/${{ github.repository_owner }}/5572tv:latest

            # 从 GitHub 下载最新 APK
            mkdir -p /app/apk-download
            APK_URL=$(curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/static/download/5572tv-android.apk" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('download_url',''))" 2>/dev/null)
            if [ -n "$APK_URL" ]; then
              curl -sL -o /app/apk-download/5572tv-android.apk "$APK_URL"
              echo "APK downloaded: $(ls -la /app/apk-download/5572tv-android.apk)"
            else
              echo "Failed to get APK download URL, keeping existing file"
            fi

            docker stop 5572tv-core || true
            docker rm 5572tv-core || true

            docker run -d \
              --name 5572tv-core \
              --network 5572tv-net \
              -p 3000:3000 \
              -e USERNAME='Danny' \
              -e PASSWORD='Danny0923' \
              -e SITE_BASE='https://www.5572.net' \
              -e NEXT_PUBLIC_SITE_NAME='5572影视' \
              -e NEXT_PUBLIC_STORAGE_TYPE='kvrocks' \
              -e KVROCKS_URL='redis://:Danny0923@kvrocks:6666' \
              -e GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}' \
              -e NVIDIA_API_KEY='${{ secrets.NVIDIA_API_KEY }}' \
              -v /app/video-cache:/app/video-cache \
              -v /app/apk-download:/app/static/download:ro \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/5572tv:latest

            docker image prune -f
