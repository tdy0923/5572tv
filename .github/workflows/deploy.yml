name: Deploy To Server

on:
  workflow_run:
    workflows: ["Build & Push Docker image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy latest image to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker pull ghcr.io/${{ github.repository_owner }}/lunatv:latest

            docker stop moontv-core || true
            docker rm moontv-core || true

            docker run -d \
              --name moontv-core \
              --network moontv-net \
              -p 3000:3000 \
              -e USERNAME='Danny' \
              -e PASSWORD='Danny0923' \
              -e SITE_BASE='https://www.5572.net' \
              -e NEXT_PUBLIC_SITE_NAME='5572影视' \
              -e NEXT_PUBLIC_STORAGE_TYPE='kvrocks' \
              -e KVROCKS_URL='redis://kvrocks:6666' \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/lunatv:latest

            docker image prune -f
