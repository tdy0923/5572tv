name: Deploy To Server

on:
  workflow_run:
    workflows: ["Build & Push Docker image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker pull ghcr.io/${{ github.repository_owner }}/5572tv:latest

            docker stop 5572tv-core || true
            docker rm 5572tv-core || true

            docker run -d \
              --name 5572tv-core \
              --network 5572tv-net \
              -p 3000:3000 \
              -e USERNAME='Danny' \
              -e PASSWORD='Danny0923' \
              -e SITE_BASE='https://www.5572.net' \
              -e NEXT_PUBLIC_SITE_NAME='5572影视' \
              -e NEXT_PUBLIC_STORAGE_TYPE='kvrocks' \
              -e KVROCKS_URL='redis://:Danny0923@kvrocks:6666' \
              -e GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}' \
              -e NVIDIA_API_KEY='${{ secrets.NVIDIA_API_KEY }}' \
              -v /app/video-cache:/app/video-cache \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/5572tv:latest

            docker image prune -f

      - name: Purge Cloudflare cache
        run: |
          ZONE=$(curl -s -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/zones?name=www.5572.net" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])" 2>/dev/null)
          if [ -n "$ZONE" ]; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"files":["https://www.5572.net/download/5572tv-android.apk"]}'
            echo "Cloudflare cache purged for APK"
          else
            echo "Failed to get Cloudflare zone ID"
          fi
        shell: bash
