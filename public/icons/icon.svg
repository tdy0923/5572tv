<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4c24d"/>
      <stop offset="50%" style="stop-color:#dba52b"/>
      <stop offset="100%" style="stop-color:#b78415"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="96" ry="96" fill="url(#shine)"/>
  <!-- Number 5 -->
  <text x="256" y="340" font-family="Arial, Helvetica, sans-serif" font-size="280" font-weight="800" fill="#1a1a1a" text-anchor="middle" opacity="0.9">5</text>
  <!-- Subtle play triangle -->
  <polygon points="340,380 340,440 390,410" fill="#1a1a1a" opacity="0.6"/>
</svg>
