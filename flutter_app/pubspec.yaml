name: media_5572
description: 5572 影视 - 智能影视播放平台
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  http: ^1.2.0
  
  # 视频播放
  video_player: ^2.8.6
  media_kit: ^1.1.10+1
  media_kit_video: ^1.2.4
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  
  # UI 组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # 工具
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  
  # 通知
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
