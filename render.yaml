services:
  - type: web
    name: 5572tv
    runtime: image
    image:
      url: ghcr.io/tdy0923/5572tv:latest
    numInstances: 1
    plan: free
    healthCheckPath: /
    envVars:
      - key: USERNAME
        sync: false
      - key: PASSWORD
        sync: false
      - key: NEXT_PUBLIC_STORAGE_TYPE
        value: upstash
      - key: UPSTASH_URL
        sync: false
      - key: UPSTASH_TOKEN
        sync: false
      - key: DISABLE_HERO_TRAILER
        value: "true"
